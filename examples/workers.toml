# Example worker profile catalog for an adopted project.
#
# Copy this to /path/to/project/.orchestrator/workers.toml and edit it for the
# CLIs, models and permission policy available on that machine.
#
# The engine only runs `command`; model, effort and permission flags belong to
# each CLI. Free-form keys such as capability, permission_profile and cost are
# advisory metadata for the orchestrating agent and are preserved in evidence.
#
# No timeout_seconds on AI worker profiles: long-running workers are allowed.
# The supervisor refreshes task.json (`last_alive_at`) while they run. Add
# timeout_seconds to bounded scripts such as smoke tests and check runners.
# Optional availability probes are adopter-owned local commands, not provider
# quota APIs. They run only via `worker availability` or the explicit
# `worker run --preflight-availability` switch, and are advisory at launch.
# availability_probe = ["/path/to/project-check", "--available"]
# availability_timeout_seconds = 5

[policies.quality-efficient]
files = ["policies/quality-efficient.md"]
quality_priority = "correctness-first"
context_strategy = "progressive"
verification_strategy = "risk-based-final-gate"
output_strategy = "compact-evidence"

# Optional bounded admission. Uncomment only after choosing host capacity.
# [dispatch]
# max_concurrent = 3
# Per-profile controls are also optional:
# max_concurrent = 1
# max_no_progress_seconds = 900   # warning only; never kills by default
# soft_duration_seconds = 3600    # informational budget
# soft_output_bytes = 1048576     # informational budget
# soft_token_budget = 100000      # needs an explicit usage_adapter
# usage_adapter = "json-lines-usage"

# --- Claude profiles ---------------------------------------------------
# Keep disabled until the Claude CLI and chosen permission mode are verified.
# `dontAsk` is non-interactive but may deny tools that need permission. Full
# profiles bypass Claude permission checks and must run only in a trusted
# project with an appropriate external security boundary.

[workers.claude-fast]
enabled = false
command = ["claude", "-p", "--model", "haiku", "--effort", "low",
           "--permission-mode", "dontAsk"]
prompt_via = "stdin"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "restricted"
cost = "low"
recommended_for = ["small-edit", "mechanical-fix"]

[workers.claude]
enabled = false
command = ["claude", "-p", "--model", "sonnet", "--effort", "high",
           "--dangerously-skip-permissions"]
prompt_via = "stdin"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "review"]

[workers.claude-deep]
enabled = false
command = ["claude", "-p", "--model", "opus", "--effort", "xhigh",
           "--dangerously-skip-permissions"]
prompt_via = "stdin"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["architecture", "large-refactor", "hard-bug"]

[workers.claude-readonly]
# Plan mode may also write under ~/.claude/plans. That provider-owned copy is
# not durable evidence: the complete result must still be returned on stdout or
# below ORCHESTRATOR_DECLARED_OUTPUT_DIR, otherwise worker diagnostics warn.
enabled = false
command = ["claude", "-p", "--model", "sonnet", "--effort", "medium",
           "--permission-mode", "plan"]
prompt_via = "stdin"
policy = "quality-efficient"
expect_long_running = true
capability = "review"
permission_profile = "readonly"
cost = "medium"
recommended_for = ["audit", "explain", "triage"]


# --- Copilot profiles --------------------------------------------------
# Detached Copilot workers cannot answer approval prompts. Use a
# project-approved autonomous policy; this example uses --allow-all
# --no-ask-user. `auto` avoids hard-coding a model that may not be available
# to every Copilot account; the effort setting still distinguishes profiles.

[workers.copilot-fast]
enabled = false
command = ["copilot", "--model", "auto", "--effort", "low",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "low"
recommended_for = ["small-edit", "mechanical-fix"]

[workers.copilot]
enabled = false
command = ["copilot", "--model", "auto", "--effort", "high",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "tests"]

[workers.copilot-deep]
enabled = false
command = ["copilot", "--model", "auto", "--effort", "xhigh",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["review", "refactor", "hard-bug"]


# --- Codex GPT-5.6 profiles -------------------------------------------
# `codex exec` must be non-interactive for detached use. Use project-approved
# config overrides for approval and sandbox behavior. Full profiles are useful
# for autonomous implementation; restricted/read-only profiles are useful for
# review and triage. Current public model roles are Luna for efficient work,
# Terra for balanced everyday work, and Sol for quality-first complex work.
# Model availability still depends on the installed CLI and account.

[workers.codex-fast]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.6-luna",
           "-c", "model_reasoning_effort=\"low\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"workspace-write\""]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "restricted"
cost = "low"
recommended_for = ["small-edit", "triage"]

[workers.codex]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.6-terra",
           "-c", "model_reasoning_effort=\"high\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"danger-full-access\""]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "tests"]

[workers.codex-deep]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.6-sol",
           "-c", "model_reasoning_effort=\"xhigh\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"danger-full-access\""]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["architecture", "large-refactor", "hard-bug"]

[workers.codex-readonly]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.6-terra",
           "-c", "model_reasoning_effort=\"medium\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"read-only\""]
prompt_via = "arg"
policy = "quality-efficient"
expect_long_running = true
capability = "review"
permission_profile = "readonly"
cost = "medium"
recommended_for = ["audit", "explain", "triage"]


# --- Verification profiles -------------------------------------------
# Bounded check runners should usually have timeout_seconds. See
# examples/check_runner.py and docs/contracts.md#verification-result.

[workers.check-fast]
enabled = false
command = ["python3", "scripts/orchestrator_check_runner.py",
           "--suite", "fast"]
prompt_via = "stdin"
capability = "test"
permission_profile = "full"
cost = "low"
timeout_seconds = 1800
recommended_for = ["tests", "pre-commit"]

[workers.check-full]
enabled = false
command = ["python3", "scripts/orchestrator_check_runner.py",
           "--suite", "full"]
prompt_via = "stdin"
capability = "test"
permission_profile = "full"
cost = "medium"
timeout_seconds = 7200
recommended_for = ["release", "full-verification"]
