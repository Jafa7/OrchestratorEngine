# Example worker profile catalog for an adopted project.
#
# Copy this to /path/to/project/.orchestrator/workers.toml and edit it for the
# CLIs, models and permission policy available on that machine.
#
# The engine only runs `command`; model, effort and permission flags belong to
# each CLI. Free-form keys such as capability, permission_profile and cost are
# advisory metadata for the orchestrating agent and are preserved in evidence.
#
# No timeout_seconds on AI worker profiles: long-running workers are allowed.
# The supervisor refreshes task.json (`last_alive_at`) while they run. Add
# timeout_seconds to bounded scripts such as smoke tests and check runners.

# --- Claude profiles ---------------------------------------------------
# Keep disabled until the Claude CLI and chosen permission mode are verified.

[workers.claude-fast]
enabled = false
command = ["claude", "-p", "--model", "haiku", "--effort", "low",
           "--permission-mode", "acceptEdits"]
prompt_via = "stdin"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "low"
recommended_for = ["small-edit", "mechanical-fix"]

[workers.claude]
enabled = false
command = ["claude", "-p", "--model", "sonnet", "--effort", "high",
           "--permission-mode", "acceptEdits"]
prompt_via = "stdin"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "review"]

[workers.claude-deep]
enabled = false
command = ["claude", "-p", "--model", "opus", "--effort", "xhigh",
           "--permission-mode", "acceptEdits"]
prompt_via = "stdin"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["architecture", "large-refactor", "hard-bug"]


# --- Copilot profiles --------------------------------------------------
# Detached Copilot workers cannot answer approval prompts. Use a
# project-approved autonomous policy; this example uses --allow-all
# --no-ask-user. Copilot model ids are exact provider ids; verify them with
# the installed CLI.

[workers.copilot-fast]
enabled = false
command = ["copilot", "--model", "claude-haiku-4.5", "--effort", "low",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "low"
recommended_for = ["small-edit", "mechanical-fix"]

[workers.copilot]
enabled = false
command = ["copilot", "--model", "claude-sonnet-5", "--effort", "high",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "tests"]

[workers.copilot-deep]
enabled = false
command = ["copilot", "--model", "claude-opus-4.8", "--effort", "xhigh",
           "--allow-all", "--no-ask-user", "--prompt"]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["review", "refactor", "hard-bug"]


# --- Codex profiles ----------------------------------------------------
# `codex exec` must be non-interactive for detached use. Use project-approved
# config overrides for approval and sandbox behavior. Full profiles are useful
# for autonomous implementation; restricted/read-only profiles are useful for
# review and triage.

[workers.codex-fast]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.5",
           "-c", "model_reasoning_effort=\"low\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"workspace-write\""]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "restricted"
cost = "low"
recommended_for = ["small-edit", "triage"]

[workers.codex]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.5",
           "-c", "model_reasoning_effort=\"high\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"danger-full-access\""]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "medium"
recommended_for = ["implementation", "tests"]

[workers.codex-deep]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.5",
           "-c", "model_reasoning_effort=\"xhigh\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"danger-full-access\""]
prompt_via = "arg"
expect_long_running = true
capability = "code-edit"
permission_profile = "full"
cost = "high"
recommended_for = ["architecture", "large-refactor", "hard-bug"]

[workers.codex-readonly]
enabled = false
command = ["codex", "exec", "--json", "-m", "gpt-5.5",
           "-c", "model_reasoning_effort=\"medium\"",
           "-c", "approval_policy=\"never\"",
           "-c", "sandbox_mode=\"read-only\""]
prompt_via = "arg"
expect_long_running = true
capability = "review"
permission_profile = "readonly"
cost = "medium"
recommended_for = ["audit", "explain", "triage"]


# --- Verification profiles -------------------------------------------
# Bounded check runners should usually have timeout_seconds. See
# examples/check_runner.py and docs/contracts.md#verification-result.

[workers.check-fast]
enabled = false
command = ["python3", "scripts/orchestrator_check_runner.py",
           "--suite", "fast"]
prompt_via = "stdin"
capability = "test"
permission_profile = "full"
cost = "low"
timeout_seconds = 1800
recommended_for = ["tests", "pre-commit"]

[workers.check-full]
enabled = false
command = ["python3", "scripts/orchestrator_check_runner.py",
           "--suite", "full"]
prompt_via = "stdin"
capability = "test"
permission_profile = "full"
cost = "medium"
timeout_seconds = 7200
recommended_for = ["release", "full-verification"]
