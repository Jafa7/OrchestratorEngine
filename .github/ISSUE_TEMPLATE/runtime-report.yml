name: Runtime Report
description: Report adopter-project runtime state, watcher health or worker setup.
title: "[Runtime Report][PROJECT] "
labels: ["runtime-report", "triage"]
body:
  - type: input
    id: adopter_project
    attributes:
      label: Adopter project
      description: Project name and local path if safe to share.
      placeholder: "DocumentationEngine (local path omitted or sanitized)"
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - codex
        - claude
        - vscode
        - other
    validations:
      required: true
  - type: input
    id: source_thread
    attributes:
      label: Source chat/thread id
      description: Optional local chat/thread id, only when useful and safe to share.
      placeholder: "Omit unless it materially helps local triage"
    validations:
      required: false
  - type: input
    id: recommended_labels
    attributes:
      label: Recommended labels
      description: Add these labels if available.
      placeholder: "project:documentationengine, source:codex"
    validations:
      required: false
  - type: textarea
    id: status_summary
    attributes:
      label: Compact status summary
      description: Paste `orchestrator-engine --project-root <root> status` summary or `report draft` output.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Include only compact commands and targeted drill-downs.
      render: shell
    validations:
      required: true
  - type: textarea
    id: runtime_changes
    attributes:
      label: Runtime changes made
      description: List service starts/restarts, worker profile edits, acknowledgements or retries. Say "none" if read-only.
    validations:
      required: true
  - type: textarea
    id: durable_artifacts
    attributes:
      label: Durable artifact ids
      description: Event ids, task ids, check ids or receipt ids relevant to this report.
    validations:
      required: false
  - type: textarea
    id: requested_action
    attributes:
      label: Requested OrchestratorEngine action
      description: What should core/docs/tests do next?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: Private documents, credentials, config secrets and unbounded logs are omitted or sanitized.
          required: true
        - label: Local artifact paths are pointers only; compact diagnostics contain the evidence needed for triage.
          required: true
