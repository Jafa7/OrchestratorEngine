name: Integration Finding
description: Report a cross-project integration observation or product-neutral improvement.
title: "[Integration Finding][PROJECT] "
labels: ["integration-finding", "triage"]
body:
  - type: input
    id: adopter_project
    attributes:
      label: Adopter project
      placeholder: "example-project"
    validations:
      required: true
  - type: input
    id: recommended_labels
    attributes:
      label: Recommended labels
      description: Add these labels if available.
      placeholder: "project:example-project, source:codex"
    validations:
      required: false
  - type: textarea
    id: observation
    attributes:
      label: Observation
      description: What happened, what was expected, and why it matters for OrchestratorEngine.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include compact command outputs, event/task/check ids and relevant paths. Avoid large logs.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: scope_boundary
    attributes:
      label: Scope boundary
      description: Explain what belongs in OrchestratorEngine core versus the adopter project.
    validations:
      required: true
  - type: textarea
    id: proposed_action
    attributes:
      label: Proposed action
      description: Suggested docs/tests/code milestone.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: Private project content, credentials and unbounded logs are omitted or sanitized.
          required: true
        - label: Local artifact paths are treated as pointers, not maintainer-accessible files.
          required: true
