name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install '.[test]'
      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  quality:
    name: Lint, build, and wheel smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build and test tools
        run: python -m pip install --upgrade build ruff '.[test]'
      - name: Check whitespace and diff cleanliness
        run: |
          git diff --check
          test -z "$(git status --porcelain)"
      - name: Check release metadata consistency
        run: python tools/check_release_consistency.py
      - name: Lint
        run: ruff check .
      - name: Build distribution
        run: python -m build
      - name: Smoke test the wheel without PYTHONPATH
        shell: bash
        run: |
          expected_version="$(python tools/check_release_consistency.py --print-version)"
          python -m venv .wheel-smoke
          env -u PYTHONPATH .wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          env -u PYTHONPATH .wheel-smoke/bin/orchestrator-engine --version | grep -Fx "orchestrator-engine ${expected_version}"
